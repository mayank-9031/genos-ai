<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px;
    height: 400px;
    overflow: hidden;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo {
    width: 400px;
    height: 400px;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wordmark {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 72px;
    color: #f0ede8;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="logo">
  <div class="wordmark">GenosAI</div>
</div>
</body>
</html>
