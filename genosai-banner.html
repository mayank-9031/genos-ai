<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=JetBrains+Mono:wght@500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1584px;
    height: 396px;
    overflow: hidden;
    background: #0A0A0F;
  }
  .banner {
    width: 1584px;
    height: 396px;
    background: #0A0A0F;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 100px;
  }

  /* Subtle noise texture overlay */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(240, 237, 232, 0.03) 1px, transparent 0);
    background-size: 32px 32px;
  }

  /* Thin horizontal lines */
  .line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(240, 237, 232, 0.06) 20%, rgba(240, 237, 232, 0.06) 80%, transparent 100%);
  }
  .line.t { top: 60px; }
  .line.b { bottom: 60px; }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    max-width: 1000px;
  }

  .brand {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 52px;
    color: #f0ede8;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: 30px;
    color: rgba(240, 237, 232, 0.75);
    line-height: 1.45;
    max-width: 800px;
  }

  .tagline em {
    font-style: normal;
    color: #f0ede8;
    font-weight: 700;
  }

  .stats-row {
    display: flex;
    gap: 48px;
    margin-top: 32px;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .stat-value {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: #f0ede8;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 12px;
    color: rgba(240, 237, 232, 0.4);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .stat-divider {
    width: 1px;
    height: 20px;
    background: rgba(240, 237, 232, 0.15);
    align-self: center;
  }

  /* Right side - minimal accent */
  .right-block {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-50%);
    text-align: right;
    z-index: 10;
  }

  .email {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(240, 237, 232, 0.3);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="line t"></div>
  <div class="line b"></div>

  <div class="content">
    <div class="brand">GenosAI</div>
    <div class="tagline">
      Everyone's getting AI.<br><em>Why isn't it coming from you?</em>
    </div>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-value">50+</span>
        <span class="stat-label">Projects</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">23+</span>
        <span class="stat-label">Clients</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">5</span>
        <span class="stat-label">Countries</span>
      </div>
    </div>
  </div>

  <div class="right-block">
    <div class="email">hello@genosai.com</div>
  </div>
</div>
</body>
</html>
